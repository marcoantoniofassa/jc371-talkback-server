# MediaMTX config - apenas RTMP pra POC talkback JC371
# Sem auth (POC interno). Em prod adicionar publish/read auth.

logLevel: info
logDestinations: [stdout]

# Habilitamos so RTMP. Resto desligado pra reduzir surface.
rtmp: yes
rtmpAddress: :1935

rtsp: no
hls: no
webrtc: no
srt: no

# Metricas/API
metrics: yes
metricsAddress: 127.0.0.1:9998
api: no

# Timeout publisher curto pra liberar canal rapido apos talkback
readTimeout: 30s
writeTimeout: 30s

# Paths dinamicos (regex catch-all) - aceita qualquer path tipo /live/<id>.
# Sem isto, MediaMTX 1.9+ bloqueia publish/read em paths nao declarados.
paths:
  all_others:
    source: publisher
